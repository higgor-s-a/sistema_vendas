<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

:root{
--azul-principal:#0ea5e9;
--azul-secundario:#0284c7;
--cinza-bg:#f1f5f9;
--texto:#0f172a;
--amarelo-dourado:#facc15;
--verde-cacto:#22c55e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,var(--azul-principal),var(--azul-secundario));
background-attachment:fixed;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* LUZ DO SOL */

.luz-sol{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:500px;
height:300px;
background:radial-gradient(
circle,
rgba(250,204,21,0.35) 0%,
rgba(250,204,21,0.18) 30%,
rgba(250,204,21,0.08) 55%,
transparent 75%
);
filter:blur(20px);
pointer-events:none;
}

/* SOL */

.sol{
text-align:center;
margin-top:40px;
}

.sol span{
font-size:90px;
color:var(--amarelo-dourado);
text-shadow:
0 0 10px #facc15,
0 0 20px #facc15,
0 0 40px #fde047,
0 0 60px #fde047;
animation: brilhoSol 3s ease-in-out infinite;
}

@keyframes brilhoSol{
0%{filter:brightness(1)}
50%{filter:brightness(1.3)}
100%{filter:brightness(1)}
}

/* CONTAINER */

.container{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* TÍTULO DO SISTEMA */

.titulo-sistema{
color:white;
font-size:36px;
font-weight:700;
letter-spacing:6px;
margin-bottom:25px;
text-align:center;

text-shadow:
0 2px 6px rgba(0,0,0,0.25),
0 0 10px rgba(255,255,255,0.35);
}

/* CARD */

.card{
background:white;
width:100%;
max-width:420px;
padding:28px;
border-radius:16px;
box-shadow:0 18px 40px rgba(0,0,0,0.25);
}

/* TÍTULO */

.card h2{
margin-top:0;
margin-bottom:20px;
font-weight:600;
color:var(--texto);
}

/* INPUTS */

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #d1d5db;
margin-bottom:16px;
font-size:16px;
}

/* BOTÃO */

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
font-size:16px;
cursor:pointer;
background:linear-gradient(135deg,#0ea5e9,#0284c7);
color:white;
transition:0.2s;
}

/* BOTÃO DESATIVADO */

button:disabled{
background:#cbd5f5;
color:#475569;
cursor:not-allowed;
opacity:0.7;
}

/* ERRO */

.erro{
background:#fee2e2;
color:#b91c1c;
padding:10px 12px;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
}

/* RODAPÉ */

.rodape{
text-align:center;
padding:20px;
color:white;
font-size:14px;
}

.rodape a{
color:#facc15;
text-decoration:none;
font-weight:600;
}

.rodape a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="luz-sol"></div>

<div class="sol">
<span class="material-symbols-outlined">brightness_7</span>
</div>

<div class="container">

<div class="titulo-sistema">
CATINGUEIRA
</div>

<div class="card">

<h2>Login</h2>

{% if erro %}
<div class="erro">{{erro}}</div>
{% endif %}

<form method="POST" id="formLogin">

<input
name="usuario"
placeholder="Usuário"
required>

<input
type="password"
name="senha"
placeholder="Senha"
required>

<button
type="submit"
id="btnEntrar">

Entrar

</button>

</form>

</div>

</div>

<div class="rodape">
© 2026 • Desenvolvido por Higgor Sampaio Alves •
<a href="https://www.linkedin.com/in/higgor-sa/" target="_blank">
LinkedIn
</a>
</div>

<script>

const form = document.getElementById("formLogin")
const btn = document.getElementById("btnEntrar")

form.addEventListener("submit",function(){

btn.disabled = true
btn.innerText = "Entrando..."

})

</script>

</body>

</html>
